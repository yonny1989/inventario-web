<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f1f5f9;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#1e3a8a;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar ul{
    list-style:none;
    padding:0;
}

.sidebar li{
    margin:15px 0;
}

.sidebar a{
    color:white;
    text-decoration:none;
}

.main{
    margin-left:260px;
    padding:20px;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.dark-btn{
    padding:10px;
    border:none;
    cursor:pointer;
}

.formulario{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.formulario input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

.formulario button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.editar{
    background:#f59e0b;
    color:white;
    border:none;
    padding:8px 12px;
    cursor:pointer;
    border-radius:5px;
}

.eliminar{
    background:#dc2626;
    color:white;
    border:none;
    padding:8px 12px;
    cursor:pointer;
    border-radius:5px;
}

.dark-mode{
    background:#111827;
    color:white;
}

</style>

</head>

<body>

<div class="sidebar">

    <h2>📦 Inventario</h2>

    <ul>
        <li><a href="#">🏠 Inicio</a></li>
        <li><a href="#">📦 Productos</a></li>
        <li><a href="#">👤 Usuarios</a></li>
        <li><a href="#">📊 Reportes</a></li>
        <li><a href="login.html">🚪 Cerrar Sesión</a></li>
    </ul>

</div>

<div class="main">

    <div class="navbar">
        <h1>Sistema Inventario</h1>

        <button class="dark-btn" onclick="modoOscuro()">
            🌙
        </button>
    </div>

    <div class="formulario">

        <input type="text" id="nombre" placeholder="Nombre Producto">

        <input type="number" id="precio" placeholder="Precio">

        <input type="number" id="cantidad" placeholder="Cantidad">

        <input type="text" id="categoria" placeholder="Categoría">

        <button onclick="guardarProducto()">
            Guardar Producto
        </button>

    </div>

    <table>

        <thead>

            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Categoría</th>
                <th>Acciones</th>
            </tr>

        </thead>

        <tbody id="tablaProductos"></tbody>

    </table>

</div>

<script>

let editandoId = null;

/* CARGAR PRODUCTOS */

async function cargarProductos(){

    try{

        const respuesta =
        await fetch("http://localhost:3000/productos");

        const productos =
        await respuesta.json();

        const tabla =
        document.getElementById("tablaProductos");

        tabla.innerHTML = "";

        productos.forEach(producto=>{

            tabla.innerHTML += `

            <tr>

                <td>${producto.id}</td>

                <td>${producto.nombre}</td>

                <td>${producto.precio}</td>

                <td>${producto.cantidad}</td>

                <td>${producto.categoria}</td>

                <td>

                    <button
                    class="editar"
                    onclick="editarProducto(
                    ${producto.id},
                    '${producto.nombre}',
                    '${producto.precio}',
                    '${producto.cantidad}',
                    '${producto.categoria}'
                    )">

                    ✏️ Editar

                    </button>

                    <button
                    class="eliminar"
                    onclick="eliminarProducto(${producto.id})">

                    🗑 Eliminar

                    </button>

                </td>

            </tr>

            `;

        });

    }catch(error){

        console.log(error);

    }

}

/* GUARDAR */

async function guardarProducto(){

    const nombre =
    document.getElementById("nombre").value;

    const precio =
    document.getElementById("precio").value;

    const cantidad =
    document.getElementById("cantidad").value;

    const categoria =
    document.getElementById("categoria").value;

    if(
        nombre==="" ||
        precio==="" ||
        cantidad==="" ||
        categoria===""){

        alert("Complete todos los campos");
        return;
    }

    if(editandoId===null){

        await fetch(
        "http://localhost:3000/productos",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                nombre,
                precio,
                cantidad,
                categoria
            })

        });

    }else{

        await fetch(
        `http://localhost:3000/productos/${editandoId}`,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                nombre,
                precio,
                cantidad,
                categoria
            })

        });

        editandoId = null;

    }

    limpiarFormulario();

    cargarProductos();

}

/* EDITAR */

function editarProducto(
id,
nombre,
precio,
cantidad,
categoria
){

    editandoId = id;

    document.getElementById("nombre").value = nombre;
    document.getElementById("precio").value = precio;
    document.getElementById("cantidad").value = cantidad;
    document.getElementById("categoria").value = categoria;

}

/* ELIMINAR */

async function eliminarProducto(id){

    const confirmar =
    confirm("¿Desea eliminar este producto?");

    if(!confirmar){

        return;

    }

    await fetch(
    `http://localhost:3000/productos/${id}`,{

        method:"DELETE"

    });

    cargarProductos();

}

/* LIMPIAR */

function limpiarFormulario(){

    document.getElementById("nombre").value="";
    document.getElementById("precio").value="";
    document.getElementById("cantidad").value="";
    document.getElementById("categoria").value="";

}

/* MODO OSCURO */

function modoOscuro(){

    document.body.classList.toggle("dark-mode");

}

/* INICIAR */

window.onload = cargarProductos;

</script>

</body>
</html>
